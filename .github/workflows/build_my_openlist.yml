name: Build My OpenList

on:
  workflow_dispatch:
    inputs:
      version:
        description: '后端版本号 (例如 v4.1.9)'
        default: 'v4.2.3'
      frontend_tag:
        description: '前端 Release 标签名 (例如 v4.1.8)'
        default: 'v4.1.10'
      lite:
        description: '使用 Lite 前端'
        type: boolean
        default: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          # --- 你可以随时在这里通过 # 注释掉不需要的平台 ---
          #- windows-amd64
          #- windows-arm64
          #- linux-amd64-musl
          - linux-arm64-musl
          #- android-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 修正为官方存在的稳定版本
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5 # 修正为官方存在的稳定版本
        with:
          go-version: '1.25.11'

      # 新增：提取环境信息写入 GITHUB_ENV，供后续构建元数据使用
      - name: Generate Build Metadata
        id: meta
        run: |
          echo "built_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
          echo "git_commit=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Download and Prepare Frontend
        env:
          REPO: "UNI-earth/OpenList-Frontend"
          TAG: ${{ inputs.frontend_tag }}
        run: |
          if [ "${{ inputs.lite }}" = "true" ]; then
            FILE="openlist-frontend-dist-lite-${TAG}.tar.gz"
          else
            FILE="openlist-frontend-dist-${TAG}.tar.gz"
          fi
          
          echo "正在下载前端: $FILE"
          URL="https://github.com/$REPO/releases/download/$TAG/$FILE"
          # 修正：补充 -f 参数，404时直接熔断报错，防止下载无效文件
          curl -fL -o frontend.tar.gz "$URL"
          
          mkdir -p public/dist
          tar -xzf frontend.tar.gz -C public/dist --strip-components=1
          echo "前端文件已准备就绪"

      - name: Build with Official Action
        uses: OpenListTeam/cgo-actions@v1.2.5
        with:
          targets: ${{ matrix.target }}
          # 修正：补充 -s -w 优化体积，并确保所有逻辑分支都覆盖到
          flags: ${{ contains(matrix.target, '-musl') && '-ldflags=-s -w -linkmode external -extldflags ''-static -fpic''' || '-ldflags=-s -w' }}
          static-link-for-musl: true
          musl-target-format: $os-$musl-$arch
          github-token: ${{ secrets.GITHUB_TOKEN }}
          out-dir: bin/release
          musl-base-url: "https://github.com/OpenListTeam/musl-compilers/releases/latest/download/"
          # 修正：调用前期生成的 metadata 环境变量
          x-flags: |
            github.com/OpenListTeam/OpenList/v4/internal/conf.BuiltAt=${{ env.built_at }}
            github.com/OpenListTeam/OpenList/v4/internal/conf.GitAuthor=The OpenList Projects Contributors <noreply@openlist.team>
            github.com/OpenListTeam/OpenList/v4/internal/conf.GitCommit=${{ env.git_commit }}
            github.com/OpenListTeam/OpenList/v4/internal/conf.Version=${{ inputs.version }}
            github.com/OpenListTeam/OpenList/v4/internal/conf.WebVersion=${{ inputs.frontend_tag }}
          output: openlist-${{ matrix.target }}$ext

      - name: Verify musl binary is static
        if: contains(matrix.target, '-musl')
        run: |
          set -e
          shopt -s nullglob
          files=(bin/release/*-musl*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No musl binaries found"
            exit 1
          fi
          for f in "${files[@]}"; do
            if readelf -l "$f" | grep -q "Requesting program interpreter"; then
              echo "Dynamic binary detected: $f"
              readelf -l "$f" | grep "Requesting program interpreter" || true
              exit 1
            fi
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenList-${{ matrix.target }}-${{ inputs.version }}
          path: bin/release/*
